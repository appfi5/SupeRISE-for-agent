services:
  wallet-api:
    build:
      context: .
      dockerfile: Dockerfile.wallet-api
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DB_PATH: /data/wallet.sqlite
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY environment variable is required. Set it in your shell or create a .env file with MASTER_KEY=your-key-here}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-token}
      RUNTIME_TOKEN: ${RUNTIME_TOKEN:-runtime-token}
      CKB_RPC_URL: https://testnet.ckb.dev/rpc
      CKB_INDEXER_URL: https://testnet.ckb.dev/indexer
    ports:
      - "3000:3000"
    volumes:
      - wallet-api-data:/data

volumes:
  wallet-api-data:
