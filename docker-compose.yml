services:
  wallet-api:
    build:
      context: .
      dockerfile: Dockerfile.wallet-api
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DB_PATH: /data/wallet.sqlite
      MASTER_KEY: change-this-master-key-before-production
      ADMIN_TOKEN: admin-token
      RUNTIME_TOKEN: runtime-token
      CKB_RPC_URL: https://testnet.ckb.dev/rpc
      CKB_INDEXER_URL: https://testnet.ckb.dev/indexer
    ports:
      - "3000:3000"
    volumes:
      - wallet-api-data:/data

volumes:
  wallet-api-data:
