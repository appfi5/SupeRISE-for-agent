name: Tag Image

on:
  push:
    tags:
      - "*"

concurrency:
  group: tag-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: superise/agent-wallet

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve tag publishing metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          git_tag="${GITHUB_REF_NAME}"
          image_tag="$git_tag"

          if [[ "$git_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            image_tag="${git_tag#v}"
          fi

          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Unsupported Docker tag derived from Git tag: $image_tag" >&2
            exit 1
          fi

          should_publish=true
          if [[ "$git_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            should_publish=false
          fi

          echo "git_tag=$git_tag" >>"$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >>"$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >>"$GITHUB_OUTPUT"
          echo "build_ref=${GITHUB_REF}" >>"$GITHUB_OUTPUT"
          echo "built_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >>"$GITHUB_OUTPUT"
          echo "app_version=$(node -p 'require(\"./package.json\").version')" >>"$GITHUB_OUTPUT"

      - name: Stop on stable release tags
        if: steps.meta.outputs.should_publish != 'true'
        run: echo "Stable semver tags are published by the formal release workflow."

      - name: Set up QEMU
        if: steps.meta.outputs.should_publish == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.meta.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.meta.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          username: superise
          password: ${{ secrets.SUPERISE_DOCKERHUB_TOKEN }}

      - name: Build and push tag image
        if: steps.meta.outputs.should_publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            SUPERISE_BUILD_REF=${{ steps.meta.outputs.build_ref }}
            SUPERISE_GIT_SHA=${{ github.sha }}
            SUPERISE_BUILT_AT=${{ steps.meta.outputs.built_at }}
          labels: |
            org.opencontainers.image.title=agent-wallet
            org.opencontainers.image.created=${{ steps.meta.outputs.built_at }}
            org.opencontainers.image.version=${{ steps.meta.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.superise.build.ref=${{ steps.meta.outputs.build_ref }}
