name: Image Release

on:
  push:
    tags:
      - "*"

concurrency:
  group: image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run test suite
        run: corepack pnpm test

      - name: Resolve image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          git_tag="${GITHUB_REF_NAME}"
          image_tag="$git_tag"
          if [[ "$git_tag" == v* ]]; then
            image_tag="${git_tag#v}"
          fi

          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Unsupported Docker tag derived from Git tag: $image_tag" >&2
            exit 1
          fi

          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

          should_latest=false
          if [[ "$git_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            && git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            should_latest=true
          fi

          tags="superise/agent-wallet:${image_tag}"
          if [[ "$should_latest" == "true" ]]; then
            tags="${tags}"$'\n''superise/agent-wallet:latest'
          fi

          echo "git_tag=$git_tag" >>"$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >>"$GITHUB_OUTPUT"
          echo "should_latest=$should_latest" >>"$GITHUB_OUTPUT"
          printf "tags<<EOF\n%s\nEOF\n" "$tags" >>"$GITHUB_OUTPUT"
          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=agent-wallet"
            echo "org.opencontainers.image.version=${image_tag}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: superise
          password: ${{ secrets.SUPERISE_DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
